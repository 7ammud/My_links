<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at center, #1e1b4b 0%, #050505 100%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 450px; width: 90%;
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            text-align: center;
        }
        .profile-img {
            width: 170px; height: 170px; border-radius: 50%;
            border: 4px solid #8b5cf6;
            box-shadow: 0 0 25px #8b5cf6;
            margin-bottom: 20px;
        }
        .neon-title { 
            font-size: 28px; font-weight: bold; margin: 10px 0;
            text-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6;
        }
        /* تصميم البايو الموحد */
        .bio-text { color: #ccc; margin-bottom: 15px; font-size: 15px; }
        
        /* تصميم عبارة النجاح الجديد */
        .success-quote {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin: 25px 0;
            padding: 10px;
            text-shadow: 0 0 10px #ffffff, 0 0 20px #8b5cf6;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 1px;
        }

        .username-alert { 
            color: #fbbf24; font-weight: bold; background: rgba(251, 191, 36, 0.1);
            padding: 8px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fbbf24;
        }
        .links { margin-top: 30px; display: grid; gap: 15px; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 16px; border-radius: 15px; text-decoration: none;
            color: #fff; font-weight: bold; transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn:hover { transform: scale(1.03); border-color: currentColor; box-shadow: 0 0 15px currentColor; }
    </style>
</head>
